<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Express Stitch Lab</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="style.css">
</head>
<body>
  <!-- Top bar -->
<div class="container-fluid top-bar text-white py-2">
  <div class="container">
    <div class="row text-center fw-semibold">
      <div class="col-md-6">MEGA SALE</div>
      <div class="col-md-6">Take 10% OFF</div>
    </div>
  </div>
</div>

<!-- Navbar -->
<nav class="navbar navbar-expand-lg py-3 custom-navbar">
  <div class="container">

    <!-- Brand / Logo -->
    <a class="navbar-brand fw-bold text-nowrap" href="#">
      Express Stitch Lab
    </a>

    <!-- Toggler -->
    <button class="navbar-toggler ms-auto" type="button" data-bs-toggle="collapse" data-bs-target="#mainNavbar">
      <span class="navbar-toggler-icon"></span>
    </button>

    <!-- Nav content -->
    <div class="collapse navbar-collapse" id="mainNavbar">

      <!-- Center nav links -->
      <ul class="navbar-nav mx-auto mb-2 mb-lg-0 text-uppercase fw-medium">
        <li class="nav-item">
          <a class="nav-link px-3" href="#">Home</a>
        </li>
        <li class="nav-item">
          <a class="nav-link px-3" href="#">Services</a>
        </li>
        <li class="nav-item">
          <a class="nav-link px-3" href="#">Weddings</a>
        </li>
        <li class="nav-item">
          <a class="nav-link px-3" href="#">Bridal</a>
        </li>
        <li class="nav-item">
          <a class="nav-link px-3" href="#">Contact</a>
        </li>
      </ul>

      <!-- Right icons -->
      <div class="d-flex align-items-center gap-3 fs-5 nav-icons">
        <a href="#" class="text-dark"><i class="bi bi-person-fill"></i></a>
        <a href="#" class="text-dark"><i class="bi bi-cart-fill"></i></a>
        <a href="#" class="text-dark"><i class="bi bi-search"></i></a>
      </div>
    </div>
  </div>
</nav>

<!-- Hero Section -->
<section class="hero-section d-flex align-items-center text-white">
  <div class="container d-flex align-items-center justify-content-between">
    <div class="row">
      <div class="col-lg-8 col-md-10 col-12">
        <p class="fs-2 text-uppercase mb-2">Look Your Best</p>
        <h1 class="fw-bold mb-4">Expert Alterations for Every Occasion</h1>
        <a href="#" class="btn text-white fw-semibold rounded-3 hero-btn">
          Make an Appointment
        </a>
      </div>
    </div>
  </div>
</section>

<!--Service Section-->
 <section class="featured-services-section">
    <div class="container">
      <div class="text-center">
        <h2 class="section-title text-uppercase">Featured Services</h2>
        <button class="btn view-all-btn">View All</button>
      </div>

      <div class="services-carousel-wrap">
        <button
          class="carousel-arrow carousel-arrow-left"
          id="scrollLeftBtn"
          aria-label="Scroll left"
          type="button"
        >
          <span style="font-size: 1.1rem;">&#8249;</span>
        </button>

        <div class="services-track" id="servicesTrack">
          <div class="service-slide">
            <div class="service-card">
              <div class="service-image-placeholder"></div>
              <div class="service-card-body text-center">
                <h3 class="service-name h6 mb-1">Trouser Hemming</h3>
               
              </div>
            </div>
          </div>

          <div class="service-slide">
            <div class="service-card">
              <div class="service-image-placeholder"></div>
              <div class="service-card-body text-center">
                <h3 class="service-name h6 mb-1">Shirt Fitting</h3>
                
              </div>
            </div>
          </div>

          <div class="service-slide">
            <div class="service-card">
              <div class="service-image-placeholder"></div>
              <div class="service-card-body text-center">
                <h3 class="service-name h6 mb-1">Zip Replacement</h3>
                
              </div>
            </div>
          </div>

          <div class="service-slide">
            <div class="service-card">
              <div class="service-image-placeholder"></div>
              <div class="service-card-body text-center">
                <h3 class="service-name h6 mb-1">Suit Alteration</h3>
                
              </div>
            </div>
          </div>

          <div class="service-slide">
            <div class="service-card">
              <div class="service-image-placeholder"></div>
              <div class="service-card-body text-center">
                <h3 class="service-name h6 mb-1">Dress Tailoring</h3>
             
              </div>
            </div>
          </div>
        </div>

        <button
          class="carousel-arrow carousel-arrow-right"
          id="scrollRightBtn"
          aria-label="Scroll right"
          type="button"
        >
          <span style="font-size: 1.1rem;">&#8250;</span>
        </button>
      </div>
    </div>
  </section>




<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="javascript.js"></script>
</body>
</html>
